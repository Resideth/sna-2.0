{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Validación Documental</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { margin:0; font-family:'Segoe UI',sans-serif; height:100vh; display:flex; }
        .left-panel { flex:1; background:#00c853; color:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px; animation:fadeIn 2s ease-in-out; }
        .left-panel img { width:180px; margin-bottom:25px; animation:bounce 3s infinite; }
        .left-panel h2 { font-weight:bold; margin-bottom:15px; display:flex; align-items:center; gap:10px; font-size:1.5rem; animation:pulse 2s infinite; }
        .left-panel h2 i { font-size:2rem; }
        .left-panel p { max-width:320px; text-align:center; font-size:1.1rem; margin-bottom:25px; }
        .icon-row { display:flex; gap:25px; margin-top:20px; }
        .icon-row i { font-size:2.2rem; animation:float 4s infinite; }
        .right-panel { flex:1; background:#fff; display:flex; justify-content:center; align-items:center; }
        .login-box { width:350px; padding:30px; }
        .login-box h3 { text-align:center; margin-bottom:20px; color:#2e7d32; font-weight:bold; }
        .form-control { border-radius:8px; border:1px solid #ccc; margin-bottom:15px; }
        .form-control:focus { border-color:#00c853; box-shadow:0 0 6px rgba(0,200,83,0.4); }
        .btn-main { background:#00c853; color:#fff; font-weight:bold; width:100%; border-radius:8px; padding:12px; transition:all 0.3s ease; margin-bottom:10px; }
        .btn-main:hover { background:#2e7d32; }
        .btn-alt { background:#43a047; color:#fff; font-weight:bold; width:100%; border-radius:8px; padding:12px; transition:all 0.3s ease; margin-bottom:10px; }
        .btn-alt:hover { background:#2e7d32; }
        .btn-home { background:#1e88e5; color:#fff; font-weight:bold; width:100%; border-radius:8px; padding:12px; transition:all 0.3s ease; }
        .btn-home:hover { background:#1565c0; }
        @keyframes pulse { 0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);} }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        @keyframes bounce { 0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);} }
        @keyframes float { 0%{transform:translateY(0);}50%{transform:translateY(-5px);}100%{transform:translateY(0);} }
        .animated-box { animation:fadeIn 0.8s ease-in-out; }
    </style>
</head>
<body>

    <!-- Panel izquierdo -->
    <div class="left-panel">
        <img src="{% static 'images/sena r.png' %}" alt="Logo Institucional">
        <h2><i class="bi bi-file-earmark-check-fill"></i> Sistema de Validación Documental</h2>
        <p>Matrícula Automatizada de Aprendices</p>
        <div class="icon-row">
            <i class="bi bi-shield-lock-fill"></i>
            <i class="bi bi-people-fill"></i>
            <i class="bi bi-journal-text"></i>
        </div>
    </div>

    <!-- Panel derecho -->
    <div class="right-panel">
        <div class="login-box">

            <!-- Bloque de mensajes -->
            {% if messages %}
              {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                  {{ message }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
              {% endfor %}
            {% endif %}

            <!-- Formulario de Login -->
            <div id="loginForm" class="animated-box">
                <h3>Bienvenido</h3>
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <input type="email" name="email" class="form-control" placeholder="Correo Electrónico" required>
                    <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                    <button type="submit" class="btn btn-main">Iniciar Sesión</button>
                    <button type="button" class="btn btn-alt" onclick="showRegister()">Registrarse</button>
                    <!-- Botón para ir al Home -->
                    <a href="{% url 'home' %}" class="btn btn-home">Ir al Home</a>
                </form>
            </div>

            <!-- Formulario de Registro -->
            <div id="registerForm" class="animated-box" style="display:none;">
                <h3>Crear Cuenta</h3>
                <form method="post" action="{% url 'register' %}">
                    {% csrf_token %}
                    <input type="text" name="username" class="form-control" placeholder="Nombre de usuario" required>
                    <input type="email" name="email" class="form-control" placeholder="Correo Electrónico" required>
                    <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                    <input type="password" name="password2" class="form-control" placeholder="Confirmar Contraseña" required>
                    <button type="submit" class="btn btn-main">Registrarse</button>
                    <button type="button" class="btn btn-alt" onclick="showLogin()">Volver</button>
                    <!-- Botón para ir al Home -->
                    <a href="{% url 'home' %}" class="btn btn-home">Ir al Home</a>
                </form>
            </div>
        </div>
    </div>

    <script>
        function showRegister() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("registerForm").style.display = "block";
        }
        function showLogin() {
            document.getElementById("registerForm").style.display = "none";
            document.getElementById("loginForm").style.display = "block";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
