{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Aprendiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f4f6f9, #e8f5e9);
            margin: 0;
            display: flex;
        }
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #00c853, #1b5e20);
            color: #fff;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: fixed;
            left: 0;
            top: 0;
            box-shadow: 4px 0 12px rgba(0,0,0,0.15);
        }
        .sidebar .nav-links { display: flex; flex-direction: column; gap: 15px; }
        .sidebar .nav-links a {
            color: #fff; text-decoration: none; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
            padding: 12px; border-radius: 8px; transition: all 0.3s ease;
        }
        .sidebar .nav-links a:hover { background: rgba(255,255,255,0.15); }
        .sidebar .nav-links a.active { background: rgba(255,255,255,0.25); font-weight: 600; }
        .dashboard-container { margin-left: 240px; padding: 30px; width: 100%; }
        .panel-title { background: #fff; border-radius: 12px; padding: 25px; margin-bottom: 25px; border-left: 6px solid #00c853; box-shadow: 0 6px 14px rgba(0,0,0,0.1); }
        .user-info { border-top: 1px solid rgba(255,255,255,0.3); padding-top: 15px; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="nav-links">
        <a href="{% url 'cargar_documentos' %}"><i class="bi bi-upload"></i> Cargar Documentos</a>
        <a href="{% url 'mis_documentos' %}"><i class="bi bi-folder"></i> Mis Documentos</a>
    </div>
    <div class="user-info">
        <div class="d-flex align-items-center mb-2">
            <div class="bg-light text-dark rounded-circle d-flex align-items-center justify-content-center" style="width:40px; height:40px; font-weight:600;">
                {{ request.user.first_name|slice:":1" }}
            </div>
            <div class="ms-2">
                <h6 class="mb-0">{{ request.user.first_name }}</h6>
                <small>Aprendiz</small>
            </div>
        </div>
        <a href="{% url 'logout' %}" class="btn btn-light btn-sm mt-3">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
        </a>
    </div>
</div>

<!-- Contenido principal -->
<div class="dashboard-container">
    <div class="panel-title">
        <h3><i class="bi bi-speedometer2"></i> Bienvenido al Dashboard</h3>
        <p>Selecciona una opción en el menú lateral.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
